# CI for the public mirror.
#
# NOTE: Until Team 3 vendoring lands (v0.2.0), the build/test jobs may RED
# because @glamornate/contracts and @glamornate/data-catalog are workspace
# deps that don't exist in this standalone clone. continue-on-error is set
# until v0.2.0; once vendoring ships, remove that flag.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Build (web)
        run: pnpm build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ''
